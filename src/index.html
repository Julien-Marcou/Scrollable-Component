<div class="scrollbar-wrapper">
  <div class="scrollbar horizontal-scrollbar top-scrollbar hidden" part="scrollbar horizontal top">
    <div class="scrollbar-track" part="scrollbar-track horizontal top">
      <div class="scrollbar-thumb" part="scrollbar-thumb horizontal top"></div>
    </div>
  </div>
  <div class="scrollbar horizontal-scrollbar bottom-scrollbar hidden" part="scrollbar horizontal bottom">
    <div class="scrollbar-track" part="scrollbar-track horizontal bottom">
      <div class="scrollbar-thumb" part="scrollbar-thumb horizontal bottom"></div>
    </div>
  </div>
  <div class="scrollbar vertical-scrollbar left-scrollbar hidden" part="scrollbar vertical left">
    <div class="scrollbar-track" part="scrollbar-track vertical left">
      <div class="scrollbar-thumb" part="scrollbar-thumb vertical left"></div>
    </div>
  </div>
  <div class="scrollbar vertical-scrollbar right-scrollbar hidden" part="scrollbar vertical right">
    <div class="scrollbar-track" part="scrollbar-track vertical right">
      <div class="scrollbar-thumb" part="scrollbar-thumb vertical right"></div>
    </div>
  </div>
</div>

<div class="content-wrapper">
  <div class="content" part="content">
    <slot></slot>
  </div>
</div>
